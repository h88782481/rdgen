services:
  rdgen:
    # 使用你自己在 GHCR 构建的镜像（由 .github/workflows/docker-publish.yml 发布）
    # 把 h88782481 换成你的 GitHub 用户名/组织；如需本地构建改用下面的 build: .
    image: ghcr.io/h88782481/rdgen:latest
    #build: .
    restart: unless-stopped
    environment:
      SECRET_KEY: "django-insecure-!(t-!f#6g#sr%yfded9(xha)g+=!6craeez^cp+*&bz_7vdk61"
      GHUSER: "github_username"
      GHBEARER: "github_access_token"
      GENURL: "accessible_url_of_server"
      ZIP_PASSWORD: ""
      GHBRANCH: "master"
      PROTOCOL: "https"
      REPONAME: "rdgen"
      SH_SECRET: ""
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
    volumes:
      - ./exe:/opt/rdgen/exe
      - ./png:/opt/rdgen/png
      - ./temp_zips:/opt/rdgen/temp_zips
